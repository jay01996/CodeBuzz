<!-- core/templates/core/base.html -->
{% load static %}
<!-- <link rel="stylesheet" href="{% static 'core/css/style.css' %}"> -->
{% now "Y" as year %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}CodeBuzz{% endblock %}</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Optional: Your own custom CSS (if needed) -->
    <!-- <link rel="stylesheet" href="{% static 'core/css/homepage.css' %}"> -->
    <!-- <link rel="stylesheet" href="{% static 'core/css/style.css' %}"> -->
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-dark-emphasis shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <img src="{% static 'core/src/logo-name.svg' %}" alt="CodeBuzz" height="50" width="140"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact</a></li>
                </ul>
                <a href="{% url 'login' %}" class="btn btn-outline-info">Login</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="conatiner">
        {% block start %}

        {% endblock %}
    </main>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-1">&copy; {{ year }} CodeBuzz — All Rights Reserved.</p>
            <p class="mb-0">
                <a href="{% url 'about' %}" class="text-white text-decoration-none me-3">About</a>
                <a href="{% url 'contact' %}" class="text-white text-decoration-none me-3">Contact</a>
                <a href="#" class="text-white text-decoration-none">Privacy Policy</a>
            </p>
        </div>
    </footer>

</body>

</html>
